<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Connecting to Google Calendar...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030712;
      color: #6b7280;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 10px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <script>
    // Post the full URL (including hash with access_token) back to the opener
    // then close this popup — the opener's listener will handle the token
    try {
      if (window.opener) {
        window.opener.postMessage(
          { type: 'oauth-callback', url: window.location.href },
          window.location.origin
        )
      }
    } catch (e) {}
    // Close after a short delay so postMessage can be delivered
    setTimeout(function() { window.close() }, 300)
  </script>
</body>
</html>
